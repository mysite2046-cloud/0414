<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メンテナンス中</title>
  <style>
    :root {
      --primary-color: #4a90e2;
      --background-color: #f0f4f8;
      --text-color: #333;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--background-color);
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: var(--text-color);
    }

    .maintenance-container {
      background: white;
      padding: 3rem;
      border-radius: 12px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      max-width: 480px;
      width: 90%;
      text-align: center;
    }

    .maintenance-container h1 {
      color: var(--primary-color);
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    .maintenance-container p {
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .maintenance-container img {
      width: 100px;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 600px) {
      .maintenance-container {
        padding: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="maintenance-container">
    <img src="https://cdn-icons-png.flaticon.com/512/1828/1828665.png" alt="メンテナンスアイコン">
    <h1>ただいまメンテナンス中</h1>
    <p>
      ご迷惑をおかけして申し訳ございません。<br>
      現在、ウェブサイトのシステム更新を行っております。<br>
      サイトはまもなく再開いたしますので、しばらくお待ちください。
    </p>
  </div>
</body>
</html>
